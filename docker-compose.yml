version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    image: dsaikiran01/mean-backend:latest
    container_name: backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongo:27017/dd_db
    depends_on:
      - mongo

  frontend:
    image: dsaikiran01/mean-frontend:latest
    container_name: frontend
    restart: always
    depends_on:
      - backend

  proxy:
    build: ./proxy
    container_name: proxy
    restart: always
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
